name: OSINT X-RAY Full Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  osint-build:
    runs-on: ubuntu-latest

    steps:
      - name: 📂 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔍 Run OSINT Scan
        run: python osint_engine.py

      - name: 🌐 Start Web Panel
        run: |
          nohup python app.py &
          sleep 5
          curl -s http://localhost:5000 | head -n 20 || echo "Web panel başlatılamadı"

      - name: 💾 Save Report
        run: |
          mkdir -p reports
          cp osint_rapor.json reports/rapor_$(date +'%Y%m%d_%H%M%S').json

      - name: 📤 Upload Artefact
        uses: actions/upload-artifact@v4
        with:
          name: osint-full-rapor
          path: reports/

      - name: 📨 Discord Notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        if: env.DISCORD_WEBHOOK != ''
        run: |
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{"content":"✅ OSINT taraması tamamlandı!","embeds":[{"title":"Detaylar","description":"'"$(date)"'","color":3066993}]}' \
               $DISCORD_WEBHOOK
          for file in reports/*.json; do
            curl -F "file=@$file" $DISCORD_WEBHOOK
          done

      - name: 📨 Telegram Notification
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        if: env.TELEGRAM_TOKEN != ''
        run: |
          for file in reports/*.json; do
            curl -s -F document=@$file "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendDocument?chat_id=${TELEGRAM_CHAT_ID}"
          done
          curl -s -F text="OSINT taraması tamamlandı!" "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage?chat_id=${TELEGRAM_CHAT_ID}"

      - name: 📄 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./templates
          destination_dir: ./web-panel
          enable_jekyll: false
        if: github.ref == 'refs/heads/main'
